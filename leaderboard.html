<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>擎科生物郑州基地 · 积分排行榜 · 2026年第23周</title>
<style>
  :root { --primary: #0b3d5c; --primary-light: #1a6b8a; --accent: #00b4a6; --gold: #d4940e; --gold-light: #fff3d6; --silver: #8899aa; --silver-light: #edf2f6; --bronze: #c47b3b; --bronze-light: #fdf2e7; --bg: #f5f7fa; --card: #ffffff; --text: #1a2332; --text-secondary: #6b7788; --border: #e8ecf1; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: linear-gradient(180deg, #e8edf5 0%, var(--bg) 100%); color: var(--text); min-height: 100vh; }
  .top-ribbon { position: fixed; top: 0; left: 0; right: 0; height: 4px; z-index: 10; background: linear-gradient(90deg, var(--primary), var(--accent), var(--gold), var(--accent), var(--primary)); background-size: 200% 200%; animation: ribbonShift 6s ease-in-out infinite; }
  @keyframes ribbonShift { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
  .container { max-width: 900px; margin: 0 auto; padding: 0 20px 40px; }
  .hero { text-align: center; padding: 40px 0 20px; }
  .hero h1 { font-size: 26px; font-weight: 800; color: var(--primary); letter-spacing: 2px; margin-bottom: 6px; }
  .hero .week-tag { display: inline-block; background: var(--primary); color: white; padding: 4px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; letter-spacing: 1px; }
  .summary-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin: 24px 0 20px; }
  .sum-card { background: var(--card); border-radius: 16px; padding: 20px 16px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.05); }
  .sum-card .sc-icon { font-size: 28px; margin-bottom: 8px; }
  .sum-card .sc-value { font-size: 28px; font-weight: 800; margin-bottom: 4px; }
  .sum-card .sc-label { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
  .sum-card.points .sc-value { color: var(--primary); }
  .sum-card.clients .sc-value { color: var(--accent); }
  .sum-card.amount .sc-value { color: var(--gold); }
  .empty-notice { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
  .empty-notice .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-notice .empty-text { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
  .empty-notice .empty-sub { font-size: 13px; }
  .footer { text-align: center; padding: 24px 0; font-size: 12px; color: #bcc3ce; line-height: 1.8; }
  @media (max-width: 640px) { .summary-row { grid-template-columns: repeat(3, 1fr); gap: 8px; } .sum-card { padding: 14px 8px; } .sum-card .sc-value { font-size: 22px; } .container { padding: 0 10px 30px; } .hero h1 { font-size: 20px; } }
</style>
</head>
<body>
<div class="top-ribbon"></div>
<div class="container">
  <div class="hero">
    <h1>擎科生物 · 郑州基地</h1>
    <div class="week-tag">2026年第23周</div>
  </div>
  <div class="summary-row">
    <div class="sum-card points">
      <div class="sc-icon">📊</div>
      <div class="sc-value">0</div>
      <div class="sc-label">汇总积分</div>
    </div>
    <div class="sum-card clients">
      <div class="sc-icon">👥</div>
      <div class="sc-value">0</div>
      <div class="sc-label">达标客户</div>
    </div>
    <div class="sum-card amount">
      <div class="sc-icon">🧧</div>
      <div class="sc-value">¥0</div>
      <div class="sc-label">汇总金额</div>
    </div>
  </div>
  <div class="empty-notice">
    <div class="empty-icon">📋</div>
    <div class="empty-text">数据更新中</div>
    <div class="empty-sub">新一期积分数据即将上线，敬请期待</div>
  </div>
  <div class="footer">
    📐 阶梯规则：15-300反应 ×0.3 · 301-500反应 ×0.7 · 501+反应 ×1.0<br>
    门槛：单周成功反应数 ≥ 15 才计入 · 擎科生物郑州基地 · 最终解释权归擎科生物所有
  </div>
</div>
</body>
</html>
