function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function doFilter() {
  var kw = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  var filtered = CLIENTS.slice();
  if (kw) {
    filtered = filtered.filter(function(c) {
      return (c.name || '').toLowerCase().indexOf(kw) !== -1
        || (c.dept || '').toLowerCase().indexOf(kw) !== -1
        || (c.group || '').toLowerCase().indexOf(kw) !== -1
        || String(c.rank).indexOf(kw) !== -1;
    });
  }
  document.getElementById('searchCount').textContent = '显示 ' + filtered.length + ' / ' + CLIENTS.length + ' 人';
  renderTable(filtered);
}
function renderTable(list) {
  var wrap = document.getElementById('tableWrapper');
  if (list.length === 0) {
    wrap.innerHTML = '<div class="no-result">😕 没有匹配的记录</div>';
    return;
  }
  var html = '<table class="rank-table"><thead><tr>';
  html += '<th>排名</th><th>姓名</th><th>课题组</th><th>单位</th><th>片区</th><th>反应数</th><th>积分</th><th>金额</th><th>档位</th>';
  html += '</tr></thead><tbody>';
  for (var i = 0; i < list.length; i++) {
    var c = list[i];
    var tierEmoji = c.rate >= 1.0 ? '🏆' : (c.rate >= 0.7 ? '🔬' : '🧬');
    var tierName = c.rate >= 1.0 ? '领航者' : (c.rate >= 0.7 ? '先锋' : '能手');
    var tierClass = c.rate >= 1.0 ? 'gold' : (c.rate >= 0.7 ? 'silver' : 'bronze');
    var rankHtml;
    if (c.rank === 1) rankHtml = '<span class="rank-medal">🥇</span>';
    else if (c.rank === 2) rankHtml = '<span class="rank-medal">🥈</span>';
    else if (c.rank === 3) rankHtml = '<span class="rank-medal">🥉</span>';
    else rankHtml = '<span class="rank-num">' + c.rank + '</span>';
    var ptsColor = c.rate >= 1.0 ? '#8b5e00' : (c.rate >= 0.7 ? '#445a6e' : '#8b6914');
    html += '<tr>';
    html += '<td class="td-rank">' + rankHtml + '</td>';
    html += '<td class="td-name" title="' + escapeHtml(c.name) + '">' + escapeHtml(c.name) + '</td>';
    html += '<td class="td-group" title="' + escapeHtml(c.group || '') + '">' + escapeHtml(c.group || '-') + '</td>';
    html += '<td class="td-dept" title="' + escapeHtml(c.dept || '') + '">' + escapeHtml(c.dept || '-') + '</td>';
    html += '<td style="font-size:12px;color:var(--text-secondary)">' + escapeHtml(c.sales || '-') + '</td>';
    html += '<td class="td-rxns">' + c.reactions + '</td>';
    html += '<td class="td-pts" style="color:' + ptsColor + '">' + c.points + '</td>';
    html += '<td class="td-value">¥' + c.value.toFixed(1) + '</td>';
    html += '<td class="td-tier"><span class="tier-badge ' + tierClass + '">' + tierEmoji + ' ' + tierName + '</span></td>';
    html += '</tr>';
  }
  html += '</tbody></table>';
  wrap.innerHTML = html;
}
document.getElementById('searchCount').textContent = '共 ' + CLIENTS.length + ' 人上榜';
renderTable(CLIENTS);
</script>
