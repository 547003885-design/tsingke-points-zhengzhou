<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>擎科生物郑州基地测序积分查询页面</title>
<style>
  :root {
    --primary: #0b3d5c;
    --primary-light: #1a6b8a;
    --accent: #00b4a6;
    --gold: #d4940e;
    --gold-light: #fff3d6;
    --silver: #8899aa;
    --silver-light: #edf2f6;
    --bronze: #c47b3b;
    --bronze-light: #fdf2e7;
    --bg: #f5f7fa;
    --card: #ffffff;
    --text: #1a2332;
    --text-secondary: #6b7788;
    --border: #e8ecf1;
    --danger: #e74c3c;
    --success: #27ae60;
    --tier-bronze-text: #8b6914;
    --tier-silver-text: #445a6e;
    --tier-gold-text: #8b5e00;
  }
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
    background: linear-gradient(180deg, #e8edf5 0%, var(--bg) 100%);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .top-ribbon {
    position: fixed; top: 0; left: 0; right: 0; height: 4px; z-index: 10;
    background: linear-gradient(90deg, var(--primary), var(--accent), var(--gold), var(--accent), var(--primary));
    background-size: 200% 200%;
    animation: ribbonShift 6s ease-in-out infinite;
  }
  @keyframes ribbonShift {
    0%,100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .app { position: relative; z-index:1; max-width: 500px; margin: 0 auto; padding: 0 16px 40px; }

  /* ========== 头部 ========== */
  .hero {
    text-align: center; padding: 40px 0 24px;
  }
  .hero .logo-icon {
    width: 64px; height: 64px; border-radius: 18px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    margin: 0 auto 16px; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 24px rgba(11,61,92,0.2);
    font-size: 30px; color: white;
  }
  .hero h1 {
    font-size: 22px; font-weight: 700; color: var(--primary);
    letter-spacing: 1px; margin-bottom: 4px;
  }
  .hero .subtitle {
    font-size: 12px; color: var(--text-secondary); letter-spacing: 3px; font-weight: 500;
  }

  /* ========== 规则圆框 ========== */
  .rules-wrap {
    margin-bottom: 20px;
  }
  .rules-label {
    text-align: center; font-size: 13px; font-weight: 700; color: var(--text);
    margin-bottom: 14px; letter-spacing: 1px;
  }
  .tier-circles {
    display: flex;
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .tier-circle {
    width: 118px;
    height: 118px;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    border: 3px solid;
    position: relative;
    transition: transform 0.25s, box-shadow 0.25s;
    cursor: default;
  }
  .tier-circle:hover {
    transform: translateY(-3px) scale(1.04);
  }
  .tier-circle.bronze {
    background: linear-gradient(145deg, #fdf6f0, var(--bronze-light));
    border-color: var(--bronze);
    box-shadow: 0 4px 16px rgba(196,123,59,0.18);
  }
  .tier-circle.bronze:hover {
    box-shadow: 0 8px 28px rgba(196,123,59,0.28);
  }
  .tier-circle.silver {
    background: linear-gradient(145deg, #f8fbfd, var(--silver-light));
    border-color: var(--silver);
    box-shadow: 0 4px 16px rgba(136,153,170,0.18);
  }
  .tier-circle.silver:hover {
    box-shadow: 0 8px 28px rgba(136,153,170,0.28);
  }
  .tier-circle.gold {
    background: linear-gradient(145deg, #fffbeb, var(--gold-light));
    border-color: var(--gold);
    box-shadow: 0 4px 16px rgba(212,148,14,0.18);
  }
  .tier-circle.gold:hover {
    box-shadow: 0 8px 28px rgba(212,148,14,0.28);
  }
  .tier-circle .tc-medal {
    font-size: 22px;
    line-height: 1;
    margin-bottom: 3px;
  }
  .tier-circle .tc-name {
    font-size: 13px;
    font-weight: 800;
    margin-bottom: 2px;
    letter-spacing: 0.5px;
  }
  .tier-circle.bronze .tc-name { color: var(--tier-bronze-text); }
  .tier-circle.silver .tc-name { color: var(--tier-silver-text); }
  .tier-circle.gold .tc-name { color: var(--tier-gold-text); }
  .tier-circle .tc-range {
    font-size: 10px;
    color: var(--text-secondary);
    margin-bottom: 1px;
    font-weight: 500;
  }
  .tier-circle .tc-rate {
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 1px;
  }
  .tier-circle.bronze .tc-rate { color: var(--bronze); }
  .tier-circle.silver .tc-rate { color: var(--silver); }
  .tier-circle.gold .tc-rate { color: var(--gold); }
  .tier-circle .tc-count {
    font-size: 9px;
    color: var(--text-secondary);
    font-weight: 500;
  }

  .rules-note {
    text-align: center;
    margin-top: 12px;
    font-size: 11px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .rules-note .rn-badge {
    background: var(--card);
    padding: 3px 10px;
    border-radius: 10px;
    font-weight: 700;
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }

  /* ========== 查询卡 ========== */
  .query-card {
    background: var(--card); border-radius: 16px; padding: 20px 16px 18px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.04); margin-bottom: 16px;
  }
  .query-card .qc-title {
    font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 2px;
    display: flex; align-items: center; gap: 6px;
  }
  .query-card .qc-title .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
  .query-card .qc-desc { font-size: 12px; color: var(--text-secondary); margin-bottom: 16px; }

  .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .input-row .input-col { flex: 1; }
  .input-col input {
    width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
    padding: 10px 12px; font-size: 14px; color: var(--text); background: var(--bg);
    outline: none; transition: all 0.2s;
  }
  .input-col input:focus { border-color: var(--primary-light); background: white; box-shadow: 0 0 0 3px rgba(26,107,138,0.06); }
  .input-col input::placeholder { color: #bcc3ce; font-size: 13px; }
  .input-col .field-label {
    font-size: 11px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px;
  }
  .input-col .field-label .req { color: var(--danger); }

  .btn-primary {
    width: 100%; border: none; border-radius: 12px; padding: 13px;
    font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: 1px;
    background: linear-gradient(135deg, var(--primary-light), var(--primary));
    color: white; transition: all 0.25s; box-shadow: 0 3px 12px rgba(11,61,92,0.15);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 5px 20px rgba(11,61,92,0.25); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .query-error { font-size: 11px; color: var(--danger); margin-top: 6px; display: none; }
  .query-error.show { display: block; }

  /* ========== 搜索结果 ========== */
  .search-result { display: none; margin-bottom: 16px; animation: fadeUp 0.35s ease; }
  @keyframes fadeUp { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
  .search-result .sr-card {
    background: linear-gradient(135deg, var(--primary), #0d4a6e);
    border-radius: 16px; padding: 20px; color: white; text-align: center;
    position: relative; overflow: hidden; box-shadow: 0 4px 20px rgba(11,61,92,0.2);
  }
  .search-result .sr-card::after {
    content: ''; position: absolute; top: -40px; right: -40px; width: 120px; height: 120px;
    background: rgba(255,255,255,0.04); border-radius: 50%;
  }
  .search-result .sr-rank {
    display: inline-block; background: rgba(255,255,255,0.18); border-radius: 16px;
    padding: 2px 12px; font-size: 11px; letter-spacing: 1px; margin-bottom: 6px;
  }
  .search-result .sr-name { font-size: 20px; font-weight: 700; }
  .search-result .sr-group { font-size: 12px; opacity: 0.6; margin-top: 2px; color: #fbbf24; }
  .search-result .sr-dept { font-size: 12px; opacity: 0.7; margin-top: 2px; }
  .search-result .sr-stats {
    display: flex; gap: 8px; margin-top: 14px;
  }
  .search-result .sr-stat {
    flex: 1; background: rgba(255,255,255,0.12); border-radius: 12px; padding: 10px 6px;
    text-align: center; backdrop-filter: blur(4px);
  }
  .search-result .sr-stat .val { font-size: 18px; font-weight: 700; }
  .search-result .sr-stat .lbl { font-size: 10px; opacity: 0.6; margin-top: 1px; }
  .search-result .sr-rate {
    margin-top: 10px; padding: 6px 12px; border-radius: 10px;
    background: rgba(255,255,255,0.1); font-size: 12px;
  }
  .search-result .sr-actions {
    display: flex; gap: 8px; margin-top: 10px;
  }
  .sr-actions .btn-sm {
    flex: 1; border: none; border-radius: 10px; padding: 10px;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .sr-actions .btn-ex {
    background: linear-gradient(135deg, var(--gold), #c4800a);
    color: white;
  }
  .sr-actions .btn-cl {
    background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.8);
  }

  .no-result {
    background: #fef9f0; border: 1px solid #f5e0b0; border-radius: 12px;
    padding: 16px; text-align: center; color: #8a6d14; font-size: 13px;
    display: none; margin-bottom: 16px;
  }
  .no-result.show { display: block; animation: fadeUp 0.35s ease; }

  /* ========== 兑换说明 ========== */
  .exchange-note {
    background: var(--card);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 16px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.04);
    text-align: center;
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.8;
  }
  .exchange-note .en-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
    letter-spacing: 1px;
  }
  .exchange-note .en-body {
    font-size: 11px;
  }

  /* ========== 好运祝福 ========== */
  .luck-line {
    text-align: center; padding: 12px 0 16px; font-size: 13px;
    color: #d4a574; letter-spacing: 3px; font-weight: 600;
    animation: luckFade 3s ease-in-out infinite;
  }
  @keyframes luckFade {
    0%,100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* ========== 底部 ========== */
  .footer {
    text-align: center; padding: 20px 0; font-size: 11px; color: #bcc3ce; line-height: 1.8;
  }

  /* ========== 兑换弹窗 ========== */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100;
    align-items: flex-end; justify-content: center; }
  .overlay.show { display: flex; }
  .modal {
    background: white; border-radius: 20px 20px 0 0; width: 100%; max-width: 500px;
    max-height: 90vh; overflow-y: auto; padding: 8px 0 32px; animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 40px; height: 4px; background: #ddd; border-radius: 2px; margin: 12px auto 16px; }
  .modal-title { font-size: 18px; font-weight: 700; text-align: center; margin-bottom: 20px; }
  .modal-body { padding: 0 20px; }
  .modal-info {
    background: var(--bg); border-radius: 12px; padding: 14px; margin-bottom: 16px;
    font-size: 13px; color: var(--text-secondary); line-height: 1.8;
  }
  .modal-info strong { color: var(--text); }
  .modal-info .highlight { color: var(--gold); font-weight: 700; font-size: 15px; }
  .quick-btns { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .quick-btn {
    border: 1.5px solid var(--border); border-radius: 10px; padding: 8px 12px;
    background: white; font-size: 13px; cursor: pointer; color: var(--text);
    transition: all 0.2s; font-weight: 500;
  }
  .quick-btn:hover { border-color: var(--gold); color: var(--gold); }
  .quick-btn.active { background: var(--gold-light); border-color: var(--gold); color: var(--gold); font-weight: 700; }
  .amount-wrap {
    display: flex; align-items: center; background: var(--bg); border-radius: 12px;
    border: 2px solid transparent; overflow: hidden; transition: all 0.2s; margin-bottom: 14px;
  }
  .amount-wrap:focus-within { border-color: var(--gold); background: white; }
  .amount-wrap .prefix { padding: 12px 0 12px 14px; font-weight: 600; color: var(--text-secondary); }
  .amount-wrap input {
    flex: 1; border: none; outline: none; background: transparent;
    padding: 12px; font-size: 17px; font-weight: 700; color: var(--text); min-width: 0;
  }
  .amount-wrap .suffix { padding: 12px 14px 12px 0; font-size: 13px; color: var(--text-secondary); }
  .modal-error {
    background: #fef2f2; color: var(--danger); border-radius: 10px; padding: 10px 12px;
    font-size: 12px; margin-bottom: 12px; display: none;
  }
  .modal-error.show { display: block; }
  .btn-confirm {
    width: 100%; border: none; border-radius: 12px; padding: 14px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    background: linear-gradient(135deg, var(--accent), #00a090);
    color: white; box-shadow: 0 3px 14px rgba(0,180,166,0.2);
    transition: all 0.25s;
  }
  .btn-confirm:disabled { opacity: 0.5; cursor: not-allowed; }

  .success-box { display: none; }
  .success-icon {
    width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, var(--success), #1e8449);
    margin: 0 auto 14px; display: flex; align-items: center; justify-content: center;
    font-size: 28px; color: white; box-shadow: 0 4px 14px rgba(39,174,96,0.25);
  }
  .success-title { font-size: 17px; font-weight: 700; text-align: center; margin-bottom: 2px; }
  .success-sub { font-size: 12px; color: var(--text-secondary); text-align: center; margin-bottom: 16px; }
  .code-box {
    background: linear-gradient(135deg, #1a2332, #2c3e50); border-radius: 14px; padding: 16px;
    text-align: center; margin-bottom: 14px;
  }
  .code-box .code-label { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 2px; margin-bottom: 4px; }
  .code-box .code-val {
    font-size: 20px; font-weight: 800; color: var(--gold); letter-spacing: 2px;
    font-family: "SF Mono", "Menlo", "Courier New", monospace; word-break: break-all;
  }
  .code-box .code-tip { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 6px; line-height: 1.5; }
  .btn-copy, .btn-close {
    width: 100%; border: none; border-radius: 12px; padding: 13px; font-size: 14px;
    font-weight: 600; cursor: pointer; margin-bottom: 8px; transition: all 0.2s;
  }
  .btn-copy {
    background: linear-gradient(135deg, var(--primary-light), var(--primary));
    color: white; box-shadow: 0 3px 12px rgba(11,61,92,0.15);
  }
  .btn-close { background: var(--bg); color: var(--text-secondary); }

  /* ========== 情绪引导 ========== */
  .emo-guide {
    text-align: center; font-size: 11px; color: rgba(255,255,255,0.55);
    margin-top: 10px; letter-spacing: 2px;
    animation: guidePulse 2s ease-in-out infinite;
  }
  @keyframes guidePulse {
    0%,100% { opacity: 0.4; }
    50% { opacity: 0.8; }
  }

  /* ========== 情绪按钮 ========== */
  .sr-close-btn {
    position: absolute; top: 10px; right: 14px; width: 28px; height: 28px;
    border-radius: 50%; background: rgba(255,255,255,0.15); border: none;
    color: rgba(255,255,255,0.7); font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; z-index: 2;
    transition: all 0.2s;
  }
  .sr-close-btn:hover { background: rgba(255,255,255,0.3); color: white; }
  .emo-actions {
    display: flex; gap: 10px; margin-top: 12px;
  }
  .emo-btn {
    flex: 1; border: none; border-radius: 14px; padding: 14px 8px;
    font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: 1px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative; overflow: hidden;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .emo-btn .emo-icon { font-size: 28px; line-height: 1; }
  .emo-btn .emo-label { font-size: 13px; }
  .emo-btn.emo-lab {
    background: linear-gradient(135deg, #e0f2fe, #bae6fd);
    color: #0369a1;
    box-shadow: 0 3px 12px rgba(3,105,161,0.12);
  }
  .emo-btn.emo-paper {
    background: linear-gradient(135deg, #fef3c7, #fde68a);
    color: #92400e;
    box-shadow: 0 3px 12px rgba(146,64,14,0.10);
  }
  .emo-btn:hover { transform: translateY(-2px); }
  .emo-btn:active { transform: translateY(0) scale(0.98); }
  .emo-btn.emo-lab:hover { box-shadow: 0 6px 20px rgba(3,105,161,0.22); }
  .emo-btn.emo-paper:hover { box-shadow: 0 6px 20px rgba(146,64,14,0.18); }
  .emo-btn:not(.used) {
    animation: emoBreath 2.5s ease-in-out infinite;
  }
  .emo-btn:hover {
    animation: none;
  }
  @keyframes emoBreath {
    0%,100% { box-shadow: 0 3px 12px rgba(0,0,0,0.10); }
    50% { box-shadow: 0 4px 20px rgba(0,0,0,0.18); }
  }
  .emo-btn.used {
    opacity: 0.35; filter: grayscale(0.6);
    transform: scale(0.95);
  }
  .emo-btn.emo-pulse {
    animation: emoBounce 0.6s ease;
  }
  @keyframes emoBounce {
    0%,100% { transform: scale(1); }
    30% { transform: scale(1.08); }
    60% { transform: scale(0.96); }
  }

  /* ========== 情绪弹窗 ========== */
  .emo-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 200; align-items: center; justify-content: center;
  }
  .emo-overlay.show { display: flex; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .emo-modal {
    background: white; border-radius: 24px; width: calc(100vw - 60px);
    max-width: 380px; overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    animation: emoPop 0.4s cubic-bezier(0.16,1,0.3,1);
  }
  @keyframes emoPop {
    from { opacity: 0; transform: scale(0.85) translateY(30px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .emo-modal .emo-svg-wrap {
    padding: 28px 20px 16px; text-align: center;
    min-height: 200px; display: flex; align-items: center; justify-content: center;
  }
  .emo-modal .emo-svg-wrap svg { width: 100%; max-width: 280px; height: auto; }
  .emo-modal .emo-msg {
    text-align: center; padding: 0 24px 6px;
    font-size: 18px; font-weight: 700; color: var(--text);
  }
  .emo-modal .emo-sub {
    text-align: center; padding: 0 24px 20px;
    font-size: 12px; color: var(--text-secondary); line-height: 1.6;
  }
  .emo-modal .emo-close-btn {
    width: 100%; border: none; border-top: 1px solid var(--border);
    padding: 15px; font-size: 15px; font-weight: 700; cursor: pointer;
    background: var(--bg); color: var(--primary);
    border-radius: 0 0 24px 24px; transition: all 0.2s;
  }
  .emo-modal .emo-close-btn:hover { background: #e8edf5; }
  .emo-modal .emo-close-btn:active { background: #dce3ed; }

  /* ========== toast提示 ========== */
  .emo-toast {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) translateY(20px);
    background: rgba(0,0,0,0.85); color: #fff; padding: 14px 28px; border-radius: 24px;
    font-size: 15px; font-weight: 600; letter-spacing: 1px; z-index: 9999;
    opacity: 0; pointer-events: none; transition: all 0.35s ease;
  }
  .emo-toast.show { opacity: 1; transform: translate(-50%,-50%) translateY(0); }

  /* ========== 响应式 ========== */
  @media (max-width: 400px) {
    .tier-circle {
      width: 100px;
      height: 100px;
    }
    .tier-circle .tc-medal { font-size: 18px; }
    .tier-circle .tc-name { font-size: 11px; }
    .tier-circle .tc-range { font-size: 9px; }
    .tier-circle .tc-rate { font-size: 10px; }
    .tier-circle .tc-count { font-size: 8px; }
  }
</style>
</head>
<body>

<div class="top-ribbon"></div>

<div class="app">

  <!-- 头部 -->
  <div class="hero">
    <div class="logo-icon">🧬</div>
    <h1>擎科生物郑州基地测序积分查询页面</h1>
    <div class="subtitle">TSINGKE BIOTECH · 郑州基地</div>
  </div>

  <!-- 规则圆框 -->

<script>
// ========== 初始化 ==========
(function init() {
  if (!window.DATA) {
    document.getElementById('queryCard').innerHTML =
      '<div style="text-align:center;padding:20px;color:#e74c3c;">⚠️ 数据加载失败，请刷新</div>';
    return;
  }
  var s = DATA.summary;
  var tiers = s.tiers || [];
  var clients = DATA.clients || [];

  // 按档位统计人数
  var tierCounts = [];
  for (var t = 0; t < tiers.length; t++) {
    var parts = tiers[t].range.split('-');
    var lo = parseInt(parts[0]);
    var hi = parts[1] === '+' ? 999999 : parseInt(parts[1]);
    var count = 0;
    for (var i = 0; i < clients.length; i++) {
      if (clients[i].reactions >= lo && clients[i].reactions <= hi) count++;
    }
    tierCounts.push(count);
  }

  // 渲染三个圆框
  var colors = ['bronze', 'silver', 'gold'];
  var medals = ['🧬', '🔬', '🏆'];
  var names = ['科研能手', '科研先锋', '科研领航者'];
  var html = '';
  for (var i = 0; i < tiers.length; i++) {
    var rangeLabel = tiers[i].range.replace('-+', '+');
    html += '<div class="tier-circle ' + colors[i] + '">';
    html += '<span class="tc-medal">' + medals[i] + '</span>';
    html += '<span class="tc-name">' + names[i] + '</span>';
    html += '<span class="tc-range">' + rangeLabel + '反应</span>';
    html += '<span class="tc-rate">×' + tiers[i].rate + '分/个</span>';
    html += '<span class="tc-count">' + tierCounts[i] + '人</span>';
    html += '</div>';
  }
  document.getElementById('tierCircles').innerHTML = html;
  document.getElementById('ruleNum').textContent = s.threshold || 15;
})();

// ========== 查询 ==========
function doQuery() {
  var name = document.getElementById('inputName').value.trim();
  var email = document.getElementById('inputEmail').value.trim();
  var errEl = document.getElementById('queryError');
  var valid = true;

  if (!name) { errEl.textContent = '请输入姓名'; errEl.classList.add('show'); valid = false; }
  else if (!email) { errEl.textContent = '请输入邮箱'; errEl.classList.add('show'); valid = false; }
  else { errEl.classList.remove('show'); }
  if (!valid) return;

  var clients = DATA.clients || [];
  var matched = null;
  var nameLower = name.toLowerCase();
  var emailLower = email.toLowerCase();
  for (var i = 0; i < clients.length; i++) {
    var c = clients[i];
    var cName = (c.name || '').toLowerCase();
    var cEmail = (c.email || '').toLowerCase();
    // 姓名：双向模糊匹配
    var nameMatch = cName.indexOf(nameLower) !== -1 || nameLower.indexOf(cName) !== -1;
    // 邮箱：记录有邮箱→精确匹配；记录没邮箱→跳过邮箱验证
    var emailMatch = cEmail ? (cEmail === emailLower) : true;
    if (nameMatch && emailMatch) {
      matched = c; break;
    }
  }

  var noResult = document.getElementById('noResult');
  var searchResult = document.getElementById('searchResult');

  if (!matched) {
    noResult.classList.add('show');
    searchResult.style.display = 'none';
    return;
  }
  noResult.classList.remove('show');
  renderSearchResult(matched);
}

function renderSearchResult(client) {
  var exchanged = getExchangedTotal(client.name);
  var remain = client.points - exchanged;
  var allExchanged = remain <= 0;
  var r = document.getElementById('searchResult');

  // 重置情绪按钮状态（新查询，可以重新点）
  emoClickedThisQuery = false;
  emoJustClicked = null;

  var tierEmoji = client.rate >= 1.0 ? '🏆' : (client.rate >= 0.7 ? '🔬' : '🧬');
  var tierName = client.rate >= 1.0 ? '科研领航者' : (client.rate >= 0.7 ? '科研先锋' : '科研能手');

  var html = '<div class="sr-card">';
  html += '<button class="sr-close-btn" onclick="clearSearch()">✕</button>';
  html += '<div class="sr-rank">' + tierEmoji + ' No.' + client.rank + ' · ' + tierName + '</div>';
  html += '<div class="sr-name">' + escapeHtml(client.name) + '</div>';
  html += '<div class="sr-group">课题组：' + escapeHtml(client.group || '') + '</div>';
  html += '<div class="sr-dept">' + escapeHtml(client.dept || '') + '</div>';
  html += '<div class="sr-stats">';
  html += '<div class="sr-stat"><div class="val">' + client.reactions + '</div><div class="lbl">成功反应数</div></div>';
  html += '<div class="sr-stat"><div class="val">' + client.points + '</div><div class="lbl">获得积分</div></div>';
  html += '<div class="sr-stat"><div class="val">×' + client.rate + '</div><div class="lbl">积分系数</div></div>';
  html += '</div>';
  // 有实际兑换记录才显示兑换行
  if (exchanged > 0) {
    html += '<div class="sr-rate">📊 ' + tierEmoji + ' ×' + client.rate + '分/个 · 已兑' + exchanged + '分 · 剩余' + remain.toFixed(2) + '分</div>';
  } else {
    html += '<div class="sr-rate">📊 ' + tierEmoji + ' ×' + client.rate + '分/个 · 积分' + client.points + '分</div>';
  }
  html += '<div class="emo-guide">✨ 点一下，接收好运</div>';
  html += '<div class="emo-actions">';
  html += '<button class="emo-btn emo-lab" onclick="showEmoCard(\'lab\', this)"><span class="emo-icon">🧬</span><span class="emo-label">实验顺利</span></button>';
  html += '<button class="emo-btn emo-paper" onclick="showEmoCard(\'paper\', this)"><span class="emo-icon">📄</span><span class="emo-label">文章必中</span></button>';
  html += '</div></div>';
  r.innerHTML = html;
  r.style.display = 'block';
  r.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function clearSearch() {
  document.getElementById('searchResult').style.display = 'none';
  document.getElementById('noResult').classList.remove('show');
  document.getElementById('inputName').value = '';
  document.getElementById('inputEmail').value = '';
}

// ========== 兑换 ==========
var currentClient = null;
function openExchange(name) {
  var clients = DATA.clients;
  for (var i = 0; i < clients.length; i++) {
    if (clients[i].name === name) { currentClient = clients[i]; break; }
  }
  if (!currentClient) return;
  var exchanged = getExchangedTotal(currentClient.name);
  var remain = currentClient.points - exchanged;

  document.getElementById('modalInfo').innerHTML =
    '<div>👤 <strong>' + escapeHtml(currentClient.name) + '</strong></div>' +
    '<div>🏛️ ' + escapeHtml(currentClient.dept || '-') + '</div>' +
    '<div>🔢 ' + currentClient.reactions + '反应 · ×' + currentClient.rate + '分/个</div>' +
    '<div>🧧 可用：<span class="highlight">' + remain.toFixed(2) + '</span>分</div>';

  var qHtml = '';
  var amts = [Math.floor(remain/2), Math.floor(remain/4), Math.floor(remain)];
  for (var j = 0; j < amts.length; j++) {
    if (amts[j] > 0) qHtml += '<button class="quick-btn" onclick="setAmount(' + amts[j] + ')">兑' + amts[j] + '分</button>';
  }
  qHtml += '<button class="quick-btn" onclick="setAmount(' + Math.floor(remain) + ')">全部兑换</button>';
  document.getElementById('quickBtns').innerHTML = qHtml;
  document.getElementById('exchangeAmount').value = '';
  document.getElementById('modalError').classList.remove('show');
  document.getElementById('btnConfirmExchange').disabled = false;
  document.getElementById('exchangeFormBox').style.display = 'block';
  document.getElementById('exchangeSuccessBox').style.display = 'none';
  document.getElementById('overlay').classList.add('show');
}

function setAmount(v) {
  document.getElementById('exchangeAmount').value = v;
  document.getElementById('modalError').classList.remove('show');
  var btns = document.querySelectorAll('.quick-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.remove('active');
    if (btns[i].textContent.indexOf(v) !== -1) btns[i].classList.add('active');
  }
}

function closeModal() { document.getElementById('overlay').classList.remove('show'); }

function generateCode() {
  return 'XADNA-' + Date.now().toString(36).toUpperCase() + '-' + Math.random().toString(36).substring(2, 8).toUpperCase();
}

function submitExchange() {
  if (!currentClient) return;
  var amount = parseFloat(document.getElementById('exchangeAmount').value) || 0;
  var exchanged = getExchangedTotal(currentClient.name);
  var remain = currentClient.points - exchanged;
  var errEl = document.getElementById('modalError');
  if (amount <= 0) { errEl.textContent = '请输入有效积分数'; errEl.classList.add('show'); return; }
  if (amount > remain) { errEl.textContent = '不能超过剩余' + remain.toFixed(2) + '分'; errEl.classList.add('show'); return; }

  var code = generateCode();
  var record = { code: code, amount: amount, time: new Date().toISOString(),
    name: currentClient.name, dept: currentClient.dept || '', email: currentClient.email || '', week: DATA.week };

  if (!exchangeCache[currentClient.name]) exchangeCache[currentClient.name] = { exchanged: 0, records: [] };
  exchangeCache[currentClient.name].exchanged += amount;
  exchangeCache[currentClient.name].records.push(record);
  saveLocalExchange(currentClient.name, record);

  document.getElementById('successPoints').textContent = amount;
  document.getElementById('successCode').textContent = code;
  document.getElementById('exchangeFormBox').style.display = 'none';
  document.getElementById('exchangeSuccessBox').style.display = 'block';
}

function copyCode() {
  var text = '【擎科生物一代测序积分兑换】\n兑换码：' + document.getElementById('successCode').textContent +
    '\n客户：' + (currentClient ? currentClient.name : '') + '\n兑换积分：' + document.getElementById('successPoints').textContent + '分\n时间：' + new Date().toLocaleString('zh-CN');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() {
      var b = document.querySelector('.btn-copy'); b.textContent = '✅ 已复制！';
      setTimeout(function() { b.textContent = '📋 复制兑换信息'; }, 2000);
    });
  }
}

// ========== 本地存储 ==========
var exchangeCache = {};
function getStorageKey() { return 'tsingke_exch_' + (DATA && DATA.week ? DATA.week : 'default'); }
function loadLocalExchanges(name) {
  var key = getStorageKey();
  try {
    var data = JSON.parse(localStorage.getItem(key) || '{}');
    var records = data[name] || [];
    var exchanged = 0;
    for (var i = 0; i < records.length; i++) exchanged += records[i].amount;
    exchangeCache[name] = { exchanged: exchanged, records: records };
    return exchangeCache[name];
  } catch(e) { exchangeCache[name] = { exchanged: 0, records: [] }; return exchangeCache[name]; }
}
function saveLocalExchange(name, record) {
  var key = getStorageKey();
  var data = JSON.parse(localStorage.getItem(key) || '{}');
  if (!data[name]) data[name] = [];
  data[name].push(record);
  localStorage.setItem(key, JSON.stringify(data));
}
function getExchangedTotal(name) {
  if (exchangeCache[name]) return exchangeCache[name].exchanged;
  return loadLocalExchanges(name).exchanged;
}

function escapeHtml(s) { if (!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

var emoJustClicked = null;
var emoClickedThisQuery = false;  // 本次查询是否已点过

function showEmoCard(type, btn) {
  // 本次查询已经点过了 → 提示
  if (emoClickedThisQuery) {
    showToast('下次查询有惊喜哦~');
    return;
  }
  // 已经选了就拦截（不允许同一次点两个）
  if (emoJustClicked && emoJustClicked !== type) return;

  emoClickedThisQuery = true;  // 标记已点

  // 灰掉另一个按钮
  var allBtns = btn.parentElement.querySelectorAll('.emo-btn');
  for (var i = 0; i < allBtns.length; i++) {
    allBtns[i].classList.remove('used', 'emo-pulse');
    allBtns[i].classList.add('used');  // 两个都灰掉
  }
  btn.classList.add('emo-pulse');
  emoJustClicked = type;

  // 随机抽一张
  var idx = Math.floor(Math.random() * EMO_SVGS[type].length);
  document.getElementById('emoSvgWrap').innerHTML = EMO_SVGS[type][idx];
  document.getElementById('emoMsg').textContent = EMO_MSGS[type][idx].msg;
  document.getElementById('emoSub').textContent = EMO_MSGS[type][idx].sub;
  document.getElementById('emoOverlay').classList.add('show');
}

function closeEmoModal() {
  document.getElementById('emoOverlay').classList.remove('show');
}

function showToast(msg) {
  var t = document.getElementById('emoToast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}

if (inputEmail) inputEmail.addEventListener('keydown', function(e) { if (e.key==='Enter') doQuery(); });
